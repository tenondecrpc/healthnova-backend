[extend]
useDefault = true

[[rules]]
id = "generic-password-assignment"
description = "Generic password variable assignment"
regex = '''(?i)(password|passwd|pwd|secret|credential)\s*=\s*['"][^'"]{4,}['"]'''
tags = ["secret", "password"]

[[rules]]
id = "generic-api-key-assignment"
description = "Generic API key variable assignment"
regex = '''(?i)(api_key|apikey|api_secret|access_key|auth_token|auth_secret)\s*=\s*['"][^'"]{8,}['"]'''
tags = ["secret", "api-key"]

[allowlist]
description = "Global allowlist"
paths = [
  '''.env\.example$''',
  '''test/.*''',
]
